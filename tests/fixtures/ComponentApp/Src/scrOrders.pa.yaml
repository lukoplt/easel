Screens:
  scrOrders:
    Properties:
      Fill: =RGBA(240, 240, 240, 1)
    Children:
      - galA:
          Control: Gallery@2.15.0
          Properties:
            Items: =Filter(Orders, CountRows(colTemp) > 0)
      - btnSync:
          Control: Classic/Button@2.2.0
          Properties:
            AccessibleLabel: ="Sync orders"
            FocusedBorderThickness: =0
            OnSelect: |
              =ForAll(colTemp, Patch(Orders, Defaults(Orders), {Name: Value}))
      - txtFilter:
          Control: Classic/TextInput@2.3.1
          Properties:
            AccessibleLabel: ="Filter pairs"
            Default: =""
      - vidPromo:
          Control: Video@2.1.0
          Properties:
            AccessibleLabel: ="Promo video"
            AutoStart: =true
      - tglNotify:
          Control: Toggle@2.1.0
          Properties:
            AccessibleLabel: ="Notifications"
            ShowValue: =false
      - lblDup1:
          Control: Label@2.5.1
          Properties:
            TabIndex: =2
            Text: =Concatenate("Order total is ", Text(Sum(colTemp, Value), "[$-en]#,##0.00"), " today")
      - lblDup2:
          Control: Label@2.5.1
          Properties:
            Text: =Concatenate("Order total is ", Text(Sum(colTemp, Value), "[$-en]#,##0.00"), " today")
      - lblDup3:
          Control: Label@2.4.0
          Properties:
            Text: =Concatenate("Order total is ", Text(Sum(colTemp, Value), "[$-en]#,##0.00"), " today")
      - lblStats:
          Control: Label@2.5.1
          Properties:
            Text: =CountRows(Filter(colPairs, V <> txtFilter.Text))
      - lblFirstOpen:
          Control: Label@2.5.1
          Properties:
            Text: =First(Filter(colTemp, Value > 10)).Value
      - lblRepeat:
          Control: Label@2.5.1
          Properties:
            Text: |
              =If(LookUp(colStatuses, Value = "Open", Value) = "Open", LookUp(colStatuses, Value = "Open", Value), "none")
      - btnNested:
          Control: Classic/Button@2.2.0
          Properties:
            AccessibleLabel: ="Rebuild pairs"
            OnSelect: |
              =ForAll(colTemp, ForAll(colStatuses, Collect(colPairs, {V: Value})))
      - tmrPoll:
          Control: Timer@2.1.0
          Properties:
            OnTimerEnd: |
              =Patch(Orders, Defaults(Orders), {Ping: Now()})
      - lblBad:
          Control: Label@2.5.1
          Properties:
            Text: =Set(broken,
