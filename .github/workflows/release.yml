name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  binaries:
    name: Publish ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, osx-arm64, linux-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single file
        run: >
          dotnet publish src/PaCheck.Cli/PaCheck.Cli.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o out/${{ matrix.rid }}

      - name: Archive
        run: |
          cd out/${{ matrix.rid }}
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            zip -r "../../pacheck-${{ matrix.rid }}.zip" pacheck.exe
          else
            tar -czf "../../pacheck-${{ matrix.rid }}.tar.gz" pacheck
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pacheck-${{ matrix.rid }}.zip
            pacheck-${{ matrix.rid }}.tar.gz

  nuget:
    name: Publish dotnet tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/PaCheck.Cli/PaCheck.Cli.csproj -c Release -o nupkg

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
