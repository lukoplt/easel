name: Release

on:
  push:
    tags: ['v*']

jobs:
  # Gate: never publish a release or package that fails the test suite.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test -c Release

  binaries:
    name: Build ${{ matrix.rid }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one platform's failure must not cancel the others
      matrix:
        rid: [win-x64, osx-arm64, linux-x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single file
        run: >
          dotnet publish src/Easel.Cli/Easel.Cli.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o out/${{ matrix.rid }}

      - name: Archive
        run: |
          cd out/${{ matrix.rid }}
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            zip -r "$GITHUB_WORKSPACE/easel-${{ matrix.rid }}.zip" easel.exe
          else
            tar -czf "$GITHUB_WORKSPACE/easel-${{ matrix.rid }}.tar.gz" easel
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.rid }}
          path: |
            easel-${{ matrix.rid }}.zip
            easel-${{ matrix.rid }}.tar.gz
          if-no-files-found: ignore
          retention-days: 1

  release:
    name: Create release
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Single upload from one job — no concurrent writes to the same release.
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*

  nuget:
    name: Publish dotnet tool
    # After the GitHub release: publishing NuGet only once the release exists narrows the
    # partial-release window (a fully atomic cross-service publish is not achievable).
    needs: [test, release]
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) — no API-key secret. Requires a Trusted Publisher
    # policy on nuget.org and a repo variable NUGET_USER (your nuget.org username).
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/Easel.Cli/Easel.Cli.csproj -c Release -o nupkg

      - name: NuGet login (Trusted Publishing)
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
