name: Feature request
description: Suggest a command, flag, or output improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that easel doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A command, flag, or behaviour. Sketch the CLI if you can.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
