# easel configuration (searched upward from the analysed app).
# Every rule can be tuned by id (PA1005) or name (screen-control-limit).

rules:
  # Enforce naming (opt-in: no patterns => rule stays silent).
  naming-convention:
    severity: warning
    patterns:
      variable: "^(gbl|var|loc)[A-Z]"
      collection: "^col[A-Z]"
      screen: "^scr[A-Z]"
      control: "^(btn|lbl|txt|gal|con|ico|img|drp|chk|tgl)[A-Z]"

  screen-control-limit:
    max: 300

  deep-nested-if:
    threshold: 2

  heavy-onstart:
    max-assignments: 6
    max-nodes: 80

  duplicate-formula:
    min-length: 40
    min-occurrences: 3

  # Turn a rule off with `off` (or `severity: off`).
  duplicate-formula: off

  hardcoded-secret:
    allowlist:
      - "https://contoso.example.com"

# Skip files by glob (matched against the reported file path).
ignore:
  - "**/Legacy*.pa.yaml"

output:
  format: console
