name: 'easel'
description: 'Static analysis for Power Apps canvas source (pa.yaml) — lint, SARIF for code scanning.'
branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  path:
    description: 'App to analyse: an unpacked source folder or a .msapp file.'
    required: true
    default: '.'
  format:
    description: 'Output format: console | json | sarif | html.'
    required: false
    default: 'sarif'
  fail-on:
    description: 'Minimum severity that fails the job: info | warning | error.'
    required: false
    default: 'warning'
  output:
    description: 'Output file for machine formats.'
    required: false
    default: 'easel.sarif'
  version:
    description: 'easel version to install (default: latest).'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Ensure .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install pac CLI
      shell: bash
      run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool || dotnet tool update --global Microsoft.PowerApps.CLI.Tool

    - name: Install easel
      shell: bash
      env:
        EASEL_VERSION: ${{ inputs.version }}
      run: |
        if [ -n "$EASEL_VERSION" ]; then
          dotnet tool install --global Easel.Tool --version "$EASEL_VERSION" || dotnet tool update --global Easel.Tool --version "$EASEL_VERSION"
        else
          dotnet tool install --global Easel.Tool || dotnet tool update --global Easel.Tool
        fi
        echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

    - name: Run easel
      shell: bash
      env:
        EASEL_PATH: ${{ inputs.path }}
        EASEL_FORMAT: ${{ inputs.format }}
        EASEL_FAIL_ON: ${{ inputs.fail-on }}
        EASEL_OUTPUT: ${{ inputs.output }}
      run: |
        easel lint "$EASEL_PATH" \
          --format "$EASEL_FORMAT" \
          --fail-on "$EASEL_FAIL_ON" \
          --output "$EASEL_OUTPUT"
